services:
  ollama:
    build: .
    image: ollama-docker-container
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Persist downloaded models across container restarts.
      - ollama-data:/root/.ollama
    environment:
      # Space-separated list of models to pull on startup.
      - PULL_MODELS=${PULL_MODELS:-llama3.2:1b}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # --- NVIDIA GPU support ---
    # Requires the NVIDIA Container Toolkit on the host. Uncomment to enable.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:
