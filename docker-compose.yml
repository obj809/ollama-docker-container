services:
  ollama:
    build: .
    image: ollama-docker-container
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Persist downloaded models across container restarts.
      - ollama-data:/root/.ollama
    networks:
      - webnet
    environment:
      # Space-separated list of models to pull on startup.
      - PULL_MODELS=${PULL_MODELS:-llama3.2:1b}
      # How long a model stays loaded in memory after the last request
      # (e.g. 30s, 10m, 24h; -1 keeps it loaded indefinitely).
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # --- NVIDIA GPU support ---
    # Requires the NVIDIA Container Toolkit on the host. Uncomment to enable.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:

networks:
  # Pre-existing network managed outside this compose project.
  webnet:
    external: true
