# Production compose. Run it explicitly:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Internal-only: no host port. Consumers reach the API over the shared
# `webnet` network at http://ollama:11434.
services:
  ollama:
    build: .
    image: ollama-docker-container
    container_name: ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - webnet
    environment:
      - PULL_MODELS=${PULL_MODELS:-llama3.2:1b deepseek-r1:1.5b}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    restart: unless-stopped
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # --- NVIDIA GPU support (requires the NVIDIA Container Toolkit) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-data:

networks:
  webnet:
    external: true
